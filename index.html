<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <title>Танковый Лабиринт</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="game-shell">
      <div class="game-wrap">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
        <div id="mobileControls" class="mobile-controls">
          <div id="moveJoystick" class="joystick floating-stick" aria-label="Джойстик движения">
            <div class="joystick-ring"></div>
            <div class="joystick-knob"></div>
            <div class="joystick-label">ХОД</div>
          </div>
          <div id="aimJoystick" class="joystick floating-stick" aria-label="Джойстик прицеливания">
            <div class="joystick-ring"></div>
            <div class="joystick-knob"></div>
            <div class="joystick-label">ПРИЦЕЛ</div>
          </div>
          <div class="action-cluster">
            <button id="apBtn" class="touch-btn sec-btn" type="button">AP</button>
            <button id="fireBtn" class="touch-btn fire-btn" type="button">ОГОНЬ</button>
            <button id="airBtn" class="touch-btn sec-btn" type="button">АВИА</button>
          </div>
        </div>
      </div>
      <canvas id="hudCanvas" width="960" height="104"></canvas>
      <div class="hint desktop-hint">
        Движение: WASD / Стрелки | Огонь: Space/ЛКМ | AP-снаряд: E | Авиаудар: Q | Улучшения: 1/2/3/4 | Рестарт: R
      </div>
      <div class="hint mobile-hint">
        Левый палец (левая часть): ход. Правый (правая часть): прицел. Кнопки: ОГОНЬ / AP / АВИА. Лучше играть в горизонтальном положении.
      </div>
    </div>
    <script src="./game.js"></script>
  </body>
</html>
